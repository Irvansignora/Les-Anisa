<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Kehadiran — Les Anisa</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0ea5e9"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/dashboard.css"/>
  <style>
    .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--neutral-400); padding: 6px 0; }
    .cal-day {
      aspect-ratio: 1; min-height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--neutral-300); position: relative;
    }
    .cal-day.has-session { cursor: default; }
    .cal-day.hadir { background: #dcfce7; color: #15803d; }
    .cal-day.izin  { background: #fef9c3; color: #a16207; }
    .cal-day.sakit { background: #dbeafe; color: #1d4ed8; }
    .cal-day.alpha { background: #fee2e2; color: #dc2626; }
    @media(max-width:360px){ .calendar-grid { gap: 3px; } .cal-day { font-size: 12px; min-height: 32px; border-radius: 8px; } }
    .cal-nav-btn {
      width: 38px; height: 38px; min-width: 38px; border-radius: 12px;
      background: var(--neutral-100); border: none; cursor: pointer;
      font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center;
      color: var(--neutral-600); transition: background .15s; flex-shrink: 0;
    }
    .cal-nav-btn:active { background: var(--neutral-200); }
    .cal-title-wrap { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .att-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .att-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--neutral-600); }
    .att-legend-dot { width: 14px; height: 14px; border-radius: 4px; }
    .att-summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
    .att-summary-item { background: white; border: 2px solid var(--neutral-100); border-radius: var(--radius-lg); padding: 12px; text-align: center; }
    .att-summary-num { font-family: var(--font-display); font-size: 26px; font-weight: 700; line-height: 1; }
    .att-summary-label { font-size: 11px; color: var(--neutral-400); font-weight: 600; margin-top: 4px; }
    @media(max-width:560px){ .att-summary-grid { grid-template-columns: repeat(2,1fr); gap: 8px; } }
    @media(max-width:360px){ .att-summary-num { font-size: 22px; } .att-summary-item { padding: 10px 8px; } }
  </style>
</head>
<body>
<div class="dash-wrapper">
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="sidebar-logo-icon">📚</div>
      <div><div class="sidebar-logo-text">Les Anisa</div><div class="sidebar-logo-sub">Portal Orang Tua</div></div>
    </a>
    <div class="sidebar-user">
      <div class="avatar" id="sb-avatar" style="background:linear-gradient(135deg,var(--sky-200),var(--purple-100));color:var(--sky-700);font-weight:800">O</div>
      <div class="sidebar-user-info"><div class="sidebar-user-name" id="sb-name">Orang Tua</div><div class="sidebar-user-role">Wali Murid</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="progress.html"   class="nav-item"><span class="nav-icon">📈</span> Perkembangan</a>
      <a href="attendance.html" class="nav-item active"><span class="nav-icon">📅</span> Kehadiran</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-install-btn" data-pwa-install onclick="triggerPWAInstall()">📲 Install App</button>
      <a href="../index.html" target="_blank" class="sidebar-view-site">🌐 Halaman Utama</a>
      <button class="btn-logout" onclick="doLogout()">🚪 Keluar</button>
    </div>
  </aside>

  <div class="dash-main">
    <div class="dash-topbar">
      <button class="topbar-icon-btn" onclick="openSidebar()">☰</button>
      <div class="topbar-logo"><div class="topbar-logo-icon">📚</div><span class="topbar-logo-text">Les Anisa</span></div>
      <button class="topbar-icon-btn" onclick="doLogout()">🚪</button>
    </div>
    <div class="dash-content">
      <div class="page-header">
        <h1 class="page-title">📅 Kehadiran</h1>
        <p class="page-sub" id="student-name-sub">Rekap kehadiran si kecil</p>
      </div>

      <!-- Summary stats -->
      <div class="att-summary-grid" id="att-summary">
        <div class="att-summary-item"><div class="att-summary-num" style="color:#15803d">–</div><div class="att-legend-dot" style="background:#dcfce7;margin:4px auto 2px;width:24px;height:6px;border-radius:3px"></div><div class="att-summary-label">Hadir</div></div>
        <div class="att-summary-item"><div class="att-summary-num" style="color:#a16207">–</div><div class="att-legend-dot" style="background:#fef9c3;margin:4px auto 2px;width:24px;height:6px;border-radius:3px"></div><div class="att-summary-label">Izin</div></div>
        <div class="att-summary-item"><div class="att-summary-num" style="color:#1d4ed8">–</div><div class="att-legend-dot" style="background:#dbeafe;margin:4px auto 2px;width:24px;height:6px;border-radius:3px"></div><div class="att-summary-label">Sakit</div></div>
        <div class="att-summary-item"><div class="att-summary-num" style="color:#dc2626">–</div><div class="att-legend-dot" style="background:#fee2e2;margin:4px auto 2px;width:24px;height:6px;border-radius:3px"></div><div class="att-summary-label">Alpha</div></div>
      </div>

      <!-- Calendar -->
      <div class="section-card" style="margin-bottom:18px">
        <div class="section-head">
          <h2 id="cal-title" style="font-size:14px">📆 Bulan Ini</h2>
          <div style="display:flex;gap:6px">
            <button onclick="prevMonth()" class="cal-nav-btn" aria-label="Bulan sebelumnya">‹</button>
            <button onclick="nextMonth()" class="cal-nav-btn" aria-label="Bulan berikutnya">›</button>
          </div>
        </div>
        <div style="padding:16px">
          <div class="att-legend">
            <div class="att-legend-item"><div class="att-legend-dot" style="background:#dcfce7"></div>Hadir</div>
            <div class="att-legend-item"><div class="att-legend-dot" style="background:#fef9c3"></div>Izin</div>
            <div class="att-legend-item"><div class="att-legend-dot" style="background:#dbeafe"></div>Sakit</div>
            <div class="att-legend-item"><div class="att-legend-dot" style="background:#fee2e2"></div>Alpha</div>
          </div>
          <div class="calendar-grid" id="cal-grid">
            <div class="empty-state"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Attendance list -->
      <div class="section-card">
        <div class="section-head"><h2>📋 Daftar Kehadiran</h2></div>
        <div id="att-list"><div class="empty-state"><div class="spinner mx-auto"></div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="bnav-item"><div class="bnav-icon">🏠</div><span class="bnav-label">Beranda</span></a>
    <a href="progress.html" class="bnav-item"><div class="bnav-icon">📈</div><span class="bnav-label">Nilai</span></a>
    <a href="attendance.html" class="bnav-item active"><div class="bnav-icon">📅</div><span class="bnav-label">Hadir</span></a>
    <a href="../index.html" class="bnav-item"><div class="bnav-icon">🌐</div><span class="bnav-label">Website</span></a>
  </div>
</nav>

<div id="toast-container"></div>
<script src="../assets/js/pwa.js"></script>
<script type="module">
import { db, auth, collection, getDocs, query, where, orderBy, onAuthStateChanged, signOut, doc, getDoc }
  from '../assets/js/firebase-config.js';
import { requireAuth, toast, formatDate, avatarInitial, ATT_STATUS } from '../assets/js/utils.js';

const user = await requireAuth(auth, onAuthStateChanged, '/login/');
const snap = await getDoc(doc(db,'users',user.uid));
const userName = snap.data()?.name || user.email?.split('@')[0] || 'Bunda/Ayah';
document.getElementById('sb-name').textContent = userName;
document.getElementById('sb-avatar').textContent = avatarInitial(userName);

const stuSnap = await getDocs(query(collection(db,'students'), where('parent_email','==', user.email)));
const students = stuSnap.docs.map(d => ({ id:d.id, ...d.data() }));
if (students.length) document.getElementById('student-name-sub').textContent = `Rekap kehadiran ${students[0].name}`;

const studentIds = students.map(s => s.id);
let allAtts = [];
if (studentIds.length) {
  try {
    const attSnap = await getDocs(query(collection(db,'attendance'), where('student_id','in', studentIds), orderBy('date','desc')));
    allAtts = attSnap.docs.map(d => d.data());
  } catch (err) {
    console.warn('attendance index belum tersedia, fallback tanpa orderBy:', err);
    const attSnap = await getDocs(query(collection(db,'attendance'), where('student_id','in', studentIds)));
    allAtts = attSnap.docs.map(d => d.data())
      .sort((a,b) => (b.date||'').localeCompare(a.date||''));
  }
}

// Summary
const counts = { hadir:0, izin:0, sakit:0, alpha:0 };
allAtts.forEach(a => { if (counts[a.status]!==undefined) counts[a.status]++; });
const summaryEl = document.getElementById('att-summary');
const colors = { hadir:'#15803d', izin:'#a16207', sakit:'#1d4ed8', alpha:'#dc2626' };
const bgs    = { hadir:'#dcfce7', izin:'#fef9c3', sakit:'#dbeafe', alpha:'#fee2e2' };
const labels = { hadir:'Hadir', izin:'Izin', sakit:'Sakit', alpha:'Alpha' };
summaryEl.innerHTML = Object.entries(counts).map(([k,v]) =>
  `<div class="att-summary-item">
    <div class="att-summary-num" style="color:${colors[k]}">${v}</div>
    <div style="width:24px;height:6px;border-radius:3px;background:${bgs[k]};margin:4px auto 2px"></div>
    <div class="att-summary-label">${labels[k]}</div>
  </div>`
).join('');

// Build date map
const dateMap = {};
allAtts.forEach(a => { dateMap[a.date] = a.status; });

// Calendar
let viewDate = new Date();
const DAYS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
const MONTHS_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function renderCalendar() {
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  document.getElementById('cal-title').textContent = `📆 ${MONTHS_ID[m]} ${y}`;
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');
  for (let i=0;i<firstDay;i++) html += '<div class="cal-day"></div>';
  for (let d=1;d<=daysInMonth;d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const status = dateMap[dateStr];
    html += `<div class="cal-day${status?' has-session '+status:''}" title="${status||''}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}
renderCalendar();
window.prevMonth = () => { viewDate.setMonth(viewDate.getMonth()-1); renderCalendar(); };
window.nextMonth = () => { viewDate.setMonth(viewDate.getMonth()+1); renderCalendar(); };

// List
const listEl = document.getElementById('att-list');
if (!allAtts.length) {
  listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>Belum ada data kehadiran</p></div>';
} else {
  const emojis = { hadir:'✅', izin:'📝', sakit:'🤒', alpha:'❌' };
  const bgMap  = { hadir:'#dcfce7', izin:'#fef9c3', sakit:'#dbeafe', alpha:'#fee2e2' };
  listEl.innerHTML = allAtts.map(a => `
    <div class="report-card">
      <div style="width:44px;height:44px;border-radius:14px;background:${bgMap[a.status]||'#f5f5f5'};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${emojis[a.status]||'📅'}</div>
      <div class="report-body">
        <div class="report-title">${formatDate(a.date)}</div>
        <div class="report-meta">
          <span style="font-weight:700;color:${colors[a.status]||'#737373'}">${labels[a.status]||a.status}</span>
          ${a.note ? ` · ${a.note}` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

window.doLogout    = async () => { await signOut(auth); window.location.href = '/login/'; };
window.openSidebar  = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); };
window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
</script>
</body>
</html>
