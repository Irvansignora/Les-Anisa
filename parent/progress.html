<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Perkembangan — Les Anisa</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0ea5e9"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/dashboard.css"/>
</head>
<body>
<div class="dash-wrapper">
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="sidebar-logo-icon">📚</div>
      <div><div class="sidebar-logo-text">Les Anisa</div><div class="sidebar-logo-sub">Portal Orang Tua</div></div>
    </a>
    <div class="sidebar-user">
      <div class="avatar" id="sb-avatar" style="background:linear-gradient(135deg,var(--sky-200),var(--purple-100));color:var(--sky-700);font-weight:800">O</div>
      <div class="sidebar-user-info"><div class="sidebar-user-name" id="sb-name">Orang Tua</div><div class="sidebar-user-role">Wali Murid</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="progress.html"   class="nav-item active"><span class="nav-icon">📈</span> Perkembangan</a>
      <a href="attendance.html" class="nav-item"><span class="nav-icon">📅</span> Kehadiran</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" target="_blank" class="sidebar-view-site">🌐 Halaman Utama</a>
      <button class="btn-logout" onclick="doLogout()">🚪 Keluar</button>
    </div>
  </aside>

  <div class="dash-main">
    <div class="dash-topbar">
      <button class="topbar-icon-btn" onclick="openSidebar()">☰</button>
      <div class="topbar-logo"><div class="topbar-logo-icon">📚</div><span class="topbar-logo-text">Les Anisa</span></div>
      <button class="topbar-icon-btn" onclick="doLogout()">🚪</button>
    </div>
    <div class="dash-content">
      <div class="page-header">
        <h1 class="page-title">📈 Perkembangan Belajar</h1>
        <p class="page-sub" id="student-name-sub">Laporan sesi calistung si kecil</p>
      </div>

      <!-- Filter -->
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-subject="all">Semua</button>
        <button class="filter-tab" data-subject="Membaca">📖 Membaca</button>
        <button class="filter-tab" data-subject="Menulis">✏️ Menulis</button>
        <button class="filter-tab" data-subject="Berhitung">🔢 Berhitung</button>
      </div>

      <!-- Reports list -->
      <div class="section-card">
        <div id="reports-list"><div class="empty-state"><div class="spinner mx-auto"></div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="bnav-item"><div class="bnav-icon">🏠</div><span class="bnav-label">Beranda</span></a>
    <a href="progress.html" class="bnav-item active"><div class="bnav-icon">📈</div><span class="bnav-label">Nilai</span></a>
    <a href="attendance.html" class="bnav-item"><div class="bnav-icon">📅</div><span class="bnav-label">Hadir</span></a>
    <a href="../index.html" class="bnav-item"><div class="bnav-icon">🌐</div><span class="bnav-label">Website</span></a>
  </div>
</nav>

<div id="toast-container"></div>
<script src="../assets/js/pwa.js"></script>
<script type="module">
import { db, auth, collection, getDocs, query, where, orderBy, onAuthStateChanged, signOut, doc, getDoc }
  from '../assets/js/firebase-config.js';
import { requireAuth, toast, formatDate, avatarInitial, scoreClass, SUBJECT_ICONS } from '../assets/js/utils.js';

const user = await requireAuth(auth, onAuthStateChanged, '/login/');
const snap = await getDoc(doc(db,'users',user.uid));
const userName = snap.data()?.name || user.email?.split('@')[0] || 'Bunda/Ayah';
document.getElementById('sb-name').textContent = userName;
document.getElementById('sb-avatar').textContent = avatarInitial(userName);

const stuSnap = await getDocs(query(collection(db,'students'), where('parent_email','==', user.email)));
const students = stuSnap.docs.map(d => ({ id:d.id, ...d.data() }));
if (students.length) document.getElementById('student-name-sub').textContent = `Laporan belajar ${students[0].name}`;

const studentIds = students.map(s => s.id);
let allReports = [];
if (studentIds.length) {
  const repSnap = await getDocs(query(collection(db,'progress_reports'), where('student_id','in', studentIds), orderBy('session_date','desc')));
  allReports = repSnap.docs.map(d => ({ id:d.id, ...d.data() }));
}

let activeSubject = 'all';

function renderReports() {
  const filtered = activeSubject === 'all' ? allReports : allReports.filter(r => r.subject === activeSubject);
  const el = document.getElementById('reports-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Belum ada laporan untuk program ini</p></div>';
    return;
  }
  el.innerHTML = filtered.map(r => {
    const sc = scoreClass(r.score);
    const imgs = (r.media_urls||[]).slice(0,3).map(u =>
      `<img src="${u}" style="width:56px;height:44px;object-fit:cover;border-radius:10px;border:2px solid var(--neutral-100);cursor:pointer" onclick="window.open('${u}')"/>`
    ).join('');
    return `<div class="report-card">
      <div class="report-score ${sc}">${r.score!=null ? r.score : (SUBJECT_ICONS[r.subject]||'📚')}</div>
      <div class="report-body">
        <div class="report-title">${r.title}</div>
        <div class="report-meta">${SUBJECT_ICONS[r.subject]||'📚'} ${r.subject} · ${formatDate(r.session_date)}</div>
        <div class="report-desc">${r.description}</div>
        ${imgs ? `<div class="report-images" style="margin-top:8px">${imgs}</div>` : ''}
        ${r.teacher_note ? `<div style="background:var(--sky-50);border-radius:10px;padding:8px 10px;margin-top:8px;font-size:12px;color:var(--sky-700);font-weight:600">💬 ${r.teacher_note}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
renderReports();

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeSubject = tab.dataset.subject;
    renderReports();
  });
});

window.doLogout    = async () => { await signOut(auth); window.location.href = '/login/'; };
window.openSidebar  = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); };
window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
</script>
</body>
</html>
