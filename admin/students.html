<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Murid — Les Anisa Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/dashboard.css"/>
</head>
<body>
<div class="dash-wrapper">
  <div class="dash-main">
    <div class="dash-content">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div><h1 class="page-title">Data Murid</h1><p class="page-sub" id="student-count">Memuat...</p></div>
        <button class="btn btn-primary" onclick="openModal('modal-student')">+ Tambah Murid</button>
      </div>

      <!-- Filter -->
      <div class="filter-tabs" id="grade-filter">
        <span class="filter-tab active" data-grade="">Semua</span>
        <span class="filter-tab" data-grade="PAUD">PAUD</span>
        <span class="filter-tab" data-grade="TK">TK</span>
        <span class="filter-tab" data-grade="SD">SD</span>
      </div>

      <!-- Table -->
      <div class="section-card">
        <div class="table-wrap">
          <table id="students-table">
            <thead><tr>
              <th>Murid</th><th>Jenjang</th><th>Program</th><th>Orang Tua</th><th>Status</th><th>Aksi</th>
            </tr></thead>
            <tbody id="students-body">
              <tr><td colspan="6"><div class="empty-state"><div class="spinner mx-auto"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Add/Edit Student -->
<div class="modal-backdrop hidden" id="modal-student">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-student-title">Tambah Murid Baru</span>
      <button class="modal-close" onclick="closeModal('modal-student')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id"/>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Nama Lengkap *</label><input type="text" class="form-input" id="s-name" placeholder="Nama anak" required/></div>
        <div class="form-group"><label class="form-label">Nama Panggilan</label><input type="text" class="form-input" id="s-nick" placeholder="Opsional"/></div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Usia</label>
          <select class="form-select" id="s-age">
            <option value="">Pilih usia...</option>
            <option>3 tahun</option><option>4 tahun</option><option>5 tahun</option><option>6 tahun</option>
            <option>7 tahun</option><option>8 tahun</option><option>9 tahun</option><option>10 tahun</option>
            <option>11 tahun</option><option>12 tahun</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Jenjang *</label>
          <select class="form-select" id="s-grade" required>
            <option value="">Pilih jenjang...</option>
            <option>PAUD / Playgroup</option><option>TK A (4-5 tahun)</option><option>TK B (5-6 tahun)</option>
            <option>SD Kelas 1</option><option>SD Kelas 2</option><option>SD Kelas 3</option>
            <option>SD Kelas 4</option><option>SD Kelas 5</option><option>SD Kelas 6</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Nama Sekolah</label><input type="text" class="form-input" id="s-school" placeholder="TK / SD anak (opsional)"/></div>
      <div class="form-group">
        <label class="form-label">Program Calistung *</label>
        <div class="subject-pills" id="s-subjects">
          <div class="subject-pill" data-value="Membaca"><div class="pill-icon">📖</div><div class="pill-label">Membaca</div></div>
          <div class="subject-pill" data-value="Menulis"><div class="pill-icon">✏️</div><div class="pill-label">Menulis</div></div>
          <div class="subject-pill" data-value="Berhitung"><div class="pill-icon">🔢</div><div class="pill-label">Berhitung</div></div>
          <div class="subject-pill" data-value="Calistung (Lengkap)"><div class="pill-icon">🌟</div><div class="pill-label">Lengkap</div></div>
        </div>
        <p class="form-error hidden" id="s-subj-err">Pilih minimal 1 program</p>
      </div>
      <div style="border-top:1px solid var(--sage-100);margin:20px 0;padding-top:16px">
        <p style="font-size:13px;font-weight:600;color:var(--sage-800);margin-bottom:12px">👨‍👩‍👦 Data Orang Tua / Wali</p>
        <div class="form-group"><label class="form-label">Nama Orang Tua *</label><input type="text" class="form-input" id="s-pname" placeholder="Nama lengkap" required/></div>
        <div class="form-grid-2">
          <div class="form-group"><label class="form-label">No. WhatsApp *</label><input type="tel" class="form-input" id="s-phone" placeholder="08xxxxxxxxxx" required/></div>
          <div class="form-group"><label class="form-label">Email (untuk login)</label><input type="email" class="form-input" id="s-email" placeholder="email@contoh.com"/></div>
        </div>
      </div>
      <div class="form-group" id="status-group" style="display:none">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--sage-700)">
          <label class="toggle"><input type="checkbox" id="s-active" checked/><span class="toggle-slider"></span></label>
          Murid Aktif
        </label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-student')">Batal</button>
      <button class="btn btn-primary btn-sm" id="save-student-btn" onclick="saveStudent()">Simpan Murid</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { db, auth, collection, getDocs, addDoc, updateDoc, doc, query, orderBy, onAuthStateChanged, serverTimestamp }
  from '../assets/js/firebase-config.js';
import { initAdminShell } from '../assets/js/admin-shell.js';
import { toast, openModal, closeModal, SUBJECT_ICONS, avatarInitial } from '../assets/js/utils.js';

await initAdminShell('students');
window.openModal  = openModal;
window.closeModal = closeModal;

let allStudents = [];
let activeGrade = '';

// ── Load students ────────────────────────────────────────────────────────
async function loadStudents() {
  const snap = await getDocs(query(collection(db,'students'), orderBy('name')));
  allStudents = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  document.getElementById('student-count').textContent = `${allStudents.length} murid terdaftar`;
  renderTable(allStudents);
}

function renderTable(students) {
  const filtered = activeGrade
    ? students.filter(s => (s.grade||'').includes(activeGrade))
    : students;
  const tbody = document.getElementById('students-body');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👶</div><p>Belum ada murid${activeGrade ? ' di jenjang ini' : ''}</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${s.photo_url ? `<img src="${s.photo_url}" class="avatar avatar-sm" style="border-radius:50%"/>` : `<div class="avatar avatar-sm">${avatarInitial(s.name)}</div>`}
          <div>
            <div style="font-weight:600;font-size:13px;color:var(--sage-900)">${s.name}</div>
            ${s.nickname ? `<div style="font-size:11px;color:var(--sage-400)">${s.nickname}</div>` : ''}
          </div>
        </div>
      </td>
      <td style="font-size:13px;color:var(--sage-700)">${s.grade||'-'}</td>
      <td>${(s.subjects||[]).map(subj => `<span style="font-size:16px" title="${subj}">${SUBJECT_ICONS[subj]||'📚'}</span>`).join(' ')}</td>
      <td>
        <div style="font-size:13px;color:var(--sage-700)">${s.parent_name||'-'}</div>
        <div style="font-size:11px;color:var(--sage-400)">${s.parent_phone||'-'}</div>
      </td>
      <td><span class="badge ${s.is_active !== false ? 'badge-green' : 'badge-sage'}">${s.is_active !== false ? 'Aktif' : 'Nonaktif'}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" onclick="editStudent('${s.id}')">✏️</button>
          <a href="https://wa.me/${(s.parent_phone||'').replace(/[^0-9]/g,'').replace(/^0/,'62')}" target="_blank" class="btn btn-sm" style="background:#dcfce7;color:#16a34a">💬</a>
        </div>
      </td>
    </tr>`).join('');
}

// ── Grade filter ─────────────────────────────────────────────────────────
document.getElementById('grade-filter').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeGrade = tab.dataset.grade;
  renderTable(allStudents);
});

// ── Subject pills ────────────────────────────────────────────────────────
document.querySelectorAll('#s-subjects .subject-pill').forEach(p =>
  p.addEventListener('click', () => p.classList.toggle('active'))
);

// ── Save student ─────────────────────────────────────────────────────────
window.saveStudent = async function() {
  const subjects = [...document.querySelectorAll('#s-subjects .subject-pill.active')].map(p => p.dataset.value);
  if (!subjects.length) { document.getElementById('s-subj-err').classList.remove('hidden'); return; }
  document.getElementById('s-subj-err').classList.add('hidden');

  const name  = document.getElementById('s-name').value.trim();
  const grade = document.getElementById('s-grade').value;
  if (!name || !grade) { toast('Isi nama dan jenjang terlebih dahulu', 'error'); return; }

  const btn = document.getElementById('save-student-btn');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

  const data = {
    name,
    nickname:     document.getElementById('s-nick').value.trim(),
    age:          document.getElementById('s-age').value,
    grade,
    school:       document.getElementById('s-school').value.trim(),
    subjects,
    parent_name:  document.getElementById('s-pname').value.trim(),
    parent_phone: document.getElementById('s-phone').value.trim(),
    parent_email: document.getElementById('s-email').value.trim(),
    is_active:    document.getElementById('s-active').checked,
    updated_at:   serverTimestamp(),
  };

  try {
    const editId = document.getElementById('edit-id').value;
    if (editId) {
      await updateDoc(doc(db,'students',editId), data);
      toast('Data murid berhasil diperbarui!', 'success');
    } else {
      data.created_at = serverTimestamp();
      await addDoc(collection(db,'students'), data);
      toast('Murid berhasil ditambahkan!', 'success');
    }
    closeModal('modal-student');
    await loadStudents();
  } catch(e) {
    toast('Gagal menyimpan: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Simpan Murid';
};

// ── Edit student ─────────────────────────────────────────────────────────
window.editStudent = function(id) {
  const s = allStudents.find(x => x.id === id);
  if (!s) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('modal-student-title').textContent = 'Edit Data Murid';
  document.getElementById('s-name').value  = s.name||'';
  document.getElementById('s-nick').value  = s.nickname||'';
  document.getElementById('s-age').value   = s.age||'';
  document.getElementById('s-grade').value = s.grade||'';
  document.getElementById('s-school').value= s.school||'';
  document.getElementById('s-pname').value = s.parent_name||'';
  document.getElementById('s-phone').value = s.parent_phone||'';
  document.getElementById('s-email').value = s.parent_email||'';
  document.getElementById('s-active').checked = s.is_active !== false;
  document.getElementById('status-group').style.display = 'block';
  document.querySelectorAll('#s-subjects .subject-pill').forEach(p =>
    p.classList.toggle('active', (s.subjects||[]).includes(p.dataset.value))
  );
  openModal('modal-student');
};

// Open add modal clean
const origOpen = window.openModal;
window.openModal = function(id) {
  if (id === 'modal-student') {
    const editId = document.getElementById('edit-id').value;
    if (!editId) {
      document.getElementById('modal-student-title').textContent = 'Tambah Murid Baru';
      document.getElementById('edit-id').value = '';
      document.getElementById('status-group').style.display = 'none';
      document.querySelectorAll('#s-subjects .subject-pill').forEach(p => p.classList.remove('active'));
      ['s-name','s-nick','s-age','s-grade','s-school','s-pname','s-phone','s-email']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    }
  }
  origOpen(id);
};

// Check URL for ?action=new
if (new URLSearchParams(location.search).get('action') === 'new') openModal('modal-student');

loadStudents();
</script>
</body>
</html>
