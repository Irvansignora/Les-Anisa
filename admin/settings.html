<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pengaturan Website — Les Anisa Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/dashboard.css"/>
</head>
<body>
<div class="dash-wrapper">
  <div class="dash-main">
    <div class="dash-content">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="page-title">Pengaturan Website</h1>
          <p class="page-sub">Edit konten landing page tanpa perlu sentuh kode</p>
        </div>
        <div style="display:flex;gap:8px">
          <a href="../index.html" target="_blank" class="btn btn-secondary btn-sm">👁 Preview</a>
          <button class="btn btn-primary btn-sm" id="save-all-btn" onclick="saveAll()" disabled>💾 Simpan Perubahan</button>
        </div>
      </div>

      <!-- Changed indicator -->
      <div id="changed-bar" class="hidden" style="background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius-lg);padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--amber-500);font-weight:500">
        ⚠️ Ada perubahan yang belum disimpan
      </div>

      <div id="settings-container">
        <div class="empty-state"><div class="spinner mx-auto"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Sticky save bar -->
<div class="save-bar" id="save-bar">
  <span id="change-count" style="font-size:14px">0 perubahan belum disimpan</span>
  <div style="display:flex;gap:10px">
    <button onclick="discardChanges()" style="background:none;border:none;color:var(--sage-300);cursor:pointer;font-size:13px">Batalkan</button>
    <button onclick="saveAll()" class="btn btn-white btn-sm" id="save-bar-btn">💾 Simpan Sekarang</button>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { db, auth, collection, getDocs, doc, setDoc, onAuthStateChanged }
  from '../assets/js/firebase-config.js';
import { CLOUDINARY_CONFIG } from '../assets/js/firebase-config.js';
import { initAdminShell } from '../assets/js/admin-shell.js';
import { toast, uploadToCloudinary } from '../assets/js/utils.js';

await initAdminShell('settings');

const GROUPS = [
  { key:'hero',         label:'🏠 Hero / Banner Utama',   fields:[
    { id:'hero_badge',         label:'Badge teks',         type:'text',     hint:'Teks kecil di atas judul' },
    { id:'hero_title',         label:'Judul utama',        type:'text',     hint:'Judul besar hero section' },
    { id:'hero_subtitle',      label:'Subtitle',           type:'textarea', hint:'Paragraf pendek di bawah judul' },
    { id:'hero_cta_primary',   label:'Tombol CTA Utama',   type:'text' },
    { id:'hero_cta_secondary', label:'Tombol CTA Kedua',   type:'text' },
    { id:'stats',              label:'Statistik (JSON)',   type:'json',     hint:'Array: [{value, label}, ...]' },
  ]},
  { key:'about', label:'ℹ️ Tentang Kami', fields:[
    { id:'about_title',    label:'Judul',           type:'text' },
    { id:'about_desc1',    label:'Paragraf 1',      type:'textarea' },
    { id:'about_desc2',    label:'Paragraf 2',      type:'textarea' },
    { id:'about_benefits', label:'Keunggulan (JSON)', type:'json', hint:'Array string: ["keunggulan 1", ...]' },
  ]},
  { key:'programs', label:'🎯 Program Calistung', fields:[
    { id:'programs', label:'Daftar Program (JSON)', type:'json', hint:'Array program: [{icon, title, subtitle, description, features[], color, age}, ...]' },
  ]},
  { key:'teacher', label:'👩‍🏫 Profil Pengajar', fields:[
    { id:'teacher_name',       label:'Nama Lengkap',     type:'text' },
    { id:'teacher_title',      label:'Jabatan',          type:'text' },
    { id:'teacher_bio',        label:'Bio',              type:'textarea' },
    { id:'teacher_photo_url',  label:'Foto (URL / Upload)', type:'photo' },
    { id:'teacher_speciality', label:'Spesialisasi',     type:'text' },
    { id:'teacher_stats',      label:'Statistik (JSON)', type:'json', hint:'Array: [{emoji, label, sub}, ...]' },
  ]},
  { key:'testimonials', label:'💬 Testimoni', fields:[
    { id:'testimonials', label:'Daftar Testimoni (JSON)', type:'json', hint:'Array: [{name, role, text, emoji, rating}, ...]' },
  ]},
  { key:'contact', label:'📞 Kontak & Lokasi', fields:[
    { id:'whatsapp_number',  label:'Nomor WhatsApp',  type:'text', hint:'Format: 6281234567890 (tanpa + atau spasi)' },
    { id:'instagram_url',    label:'URL Instagram',   type:'text' },
    { id:'email_contact',    label:'Email',           type:'text' },
    { id:'address',          label:'Alamat/Lokasi',   type:'textarea' },
    { id:'operational_hours',label:'Jam Operasional', type:'textarea', hint:'Bisa multi-baris' },
  ]},
  { key:'seo', label:'🔍 SEO & Metadata', fields:[
    { id:'site_name',        label:'Nama Website',    type:'text' },
    { id:'site_tagline',     label:'Tagline',         type:'text' },
    { id:'meta_description', label:'Meta Description',type:'textarea', hint:'Maks 160 karakter untuk SEO optimal' },
  ]},
];

let currentSettings = {};
let changes = {};

// ── Load all settings ────────────────────────────────────────────────────
async function loadSettings() {
  const snap = await getDocs(collection(db,'site_settings'));
  currentSettings = {};
  snap.forEach(d => { currentSettings[d.id] = d.data().value; });
  renderSettings();
}

function valueToStr(val) {
  if (val === null || val === undefined) return '';
  if (typeof val === 'object') return JSON.stringify(val, null, 2);
  return String(val);
}

function renderSettings() {
  document.getElementById('settings-container').innerHTML = GROUPS.map(group => `
    <div class="section-card" style="margin-bottom:16px">
      <div class="section-head" style="cursor:pointer" onclick="toggleGroup('grp-${group.key}')">
        <h2 style="font-size:16px">${group.label}</h2>
        <span id="grp-arrow-${group.key}" style="color:var(--sage-400);font-size:18px">▾</span>
      </div>
      <div id="grp-${group.key}" style="padding:0 20px 16px">
        ${group.fields.map(f => renderField(f)).join('')}
      </div>
    </div>`).join('');
}

function renderField(f) {
  const val = valueToStr(currentSettings[f.id]);
  const changed = f.id in changes;
  const border = changed ? 'border-color:var(--amber-400)' : '';

  const input = f.type === 'textarea' || f.type === 'json'
    ? `<textarea class="form-textarea" id="field-${f.id}" style="font-family:${f.type==='json'?'monospace':'inherit'};font-size:13px;min-height:${f.type==='json'?'120px':'72px'};${border}" oninput="markChanged('${f.id}',this.value)">${val}</textarea>`
    : f.type === 'photo'
    ? `<div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
        ${val ? `<img src="${val}" style="width:64px;height:64px;object-fit:cover;border-radius:12px;border:1px solid var(--sage-200)" id="photo-preview-${f.id}"/>` : `<div id="photo-preview-${f.id}" style="width:64px;height:64px;background:var(--sage-100);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px">👩‍🏫</div>`}
        <div style="flex:1;min-width:160px">
          <input type="text" class="form-input" id="field-${f.id}" value="${val}" placeholder="URL foto..." style="margin-bottom:6px;${border}" oninput="markChanged('${f.id}',this.value)"/>
          <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--sage-600);cursor:pointer;background:var(--sage-50);border:1px solid var(--sage-200);padding:6px 12px;border-radius:8px">
            <input type="file" accept="image/*" style="display:none" onchange="uploadPhoto('${f.id}',this)"/> 📤 Upload Foto
          </label>
          <div id="upload-status-${f.id}" style="font-size:12px;color:var(--sage-400);margin-top:4px"></div>
        </div>
      </div>`
    : `<input type="text" class="form-input" id="field-${f.id}" value="${val}" style="${border}" oninput="markChanged('${f.id}',this.value)"/>`;

  return `<div class="settings-row" style="border-bottom:1px solid var(--sage-50);padding:14px 0">
    <div>
      <div class="settings-label">${f.label}${changed ? ' <span style="color:var(--amber-500);font-size:11px">● berubah</span>' : ''}</div>
      ${f.hint ? `<div class="settings-hint">${f.hint}</div>` : ''}
    </div>
    <div>${input}</div>
  </div>`;
}

window.toggleGroup = function(id) {
  const el    = document.getElementById(id);
  const arrow = document.getElementById('grp-arrow-' + id.replace('grp-',''));
  const isHidden = el.style.display === 'none';
  el.style.display    = isHidden ? 'block' : 'none';
  arrow.textContent   = isHidden ? '▾' : '▸';
};

window.markChanged = function(id, val) {
  changes[id] = val;
  const count = Object.keys(changes).length;
  document.getElementById('save-all-btn').disabled = false;
  document.getElementById('changed-bar').classList.remove('hidden');
  document.getElementById('save-bar').classList.add('visible');
  document.getElementById('change-count').textContent = `${count} perubahan belum disimpan`;
};

window.uploadPhoto = async function(fieldId, input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById(`upload-status-${fieldId}`);
  status.textContent = '⏳ Mengupload...';
  try {
    const url = await uploadToCloudinary(file, CLOUDINARY_CONFIG);
    document.getElementById(`field-${fieldId}`).value = url;
    const prev = document.getElementById(`photo-preview-${fieldId}`);
    if (prev) prev.src ? (prev.src = url) : (prev.innerHTML = `<img src="${url}" style="width:64px;height:64px;object-fit:cover;border-radius:12px"/>`);
    markChanged(fieldId, url);
    status.textContent = '✅ Upload berhasil!';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch(e) {
    status.textContent = '❌ Gagal upload';
    toast('Gagal upload foto: ' + e.message, 'error');
  }
};

window.saveAll = async function() {
  if (!Object.keys(changes).length) { toast('Tidak ada perubahan', 'info'); return; }
  const btn  = document.getElementById('save-all-btn');
  const btn2 = document.getElementById('save-bar-btn');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';
  btn2.textContent = '⏳ Menyimpan...';

  try {
    // Validate JSON fields before saving
    for (const [key, val] of Object.entries(changes)) {
      const field = GROUPS.flatMap(g => g.fields).find(f => f.id === key);
      if (field?.type === 'json') {
        try { JSON.parse(val); }
        catch { toast(`Format JSON tidak valid: ${field.label}`, 'error'); btn.disabled=false; btn.textContent='💾 Simpan Perubahan'; btn2.textContent='💾 Simpan Sekarang'; return; }
      }
    }

    for (const [key, rawVal] of Object.entries(changes)) {
      const field = GROUPS.flatMap(g => g.fields).find(f => f.id === key);
      let value = rawVal;
      if (field?.type === 'json') { try { value = JSON.parse(rawVal); } catch {} }
      await setDoc(doc(db,'site_settings',key), { value, updated_at: new Date().toISOString() }, { merge:true });
    }

    toast(`${Object.keys(changes).length} pengaturan berhasil disimpan!`, 'success');
    changes = {};
    await loadSettings();
    document.getElementById('changed-bar').classList.add('hidden');
    document.getElementById('save-bar').classList.remove('visible');
    document.getElementById('save-all-btn').disabled = true;
  } catch(e) { toast('Gagal menyimpan: ' + e.message, 'error'); }
  btn.textContent  = '💾 Simpan Perubahan';
  btn2.textContent = '💾 Simpan Sekarang';
};

window.discardChanges = function() {
  changes = {};
  document.getElementById('changed-bar').classList.add('hidden');
  document.getElementById('save-bar').classList.remove('visible');
  document.getElementById('save-all-btn').disabled = true;
  loadSettings();
  toast('Perubahan dibatalkan', 'info');
};

loadSettings();
</script>
</body>
</html>
