<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laporan Belajar — Les Anisa Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/dashboard.css"/>
</head>
<body>
<div class="dash-wrapper">
  <div class="dash-main">
    <div class="dash-content">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div><h1 class="page-title">Laporan Belajar</h1><p class="page-sub" id="report-count">Memuat...</p></div>
        <button class="btn btn-primary" onclick="openAddModal()">+ Tambah Laporan</button>
      </div>

      <!-- Subject filter -->
      <div class="filter-tabs" id="subj-filter">
        <span class="filter-tab active" data-subj="">Semua</span>
        <span class="filter-tab" data-subj="Membaca">📖 Membaca</span>
        <span class="filter-tab" data-subj="Menulis">✏️ Menulis</span>
        <span class="filter-tab" data-subj="Berhitung">🔢 Berhitung</span>
        <span class="filter-tab" data-subj="Calistung (Lengkap)">🌟 Lengkap</span>
      </div>

      <div class="section-card" id="reports-wrap">
        <div class="empty-state"><div class="spinner mx-auto"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Add/Edit Report -->
<div class="modal-backdrop hidden" id="modal-report">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-report-title">Tambah Laporan Belajar</span>
      <button class="modal-close" onclick="closeModal('modal-report')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="r-edit-id"/>
      <div class="form-group">
        <label class="form-label">Murid *</label>
        <select class="form-select" id="r-student" required>
          <option value="">Pilih murid...</option>
        </select>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Program *</label>
          <select class="form-select" id="r-subject" onchange="updateLevels()" required>
            <option value="">Pilih program...</option>
            <option value="Membaca">📖 Membaca</option>
            <option value="Menulis">✏️ Menulis</option>
            <option value="Berhitung">🔢 Berhitung</option>
            <option value="Calistung (Lengkap)">🌟 Calistung (Lengkap)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Tanggal Sesi *</label>
          <input type="date" class="form-input" id="r-date" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Judul Sesi *</label>
        <input type="text" class="form-input" id="r-title" placeholder="cth: Latihan Suku Kata Ba-Bi-Bu" required/>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Nilai (0–100)</label>
          <input type="number" class="form-input" id="r-score" min="0" max="100" placeholder="85"/>
        </div>
        <div class="form-group" id="level-group">
          <label class="form-label">Level yang Dicapai</label>
          <select class="form-select" id="r-level">
            <option value="">Pilih level...</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Catatan Perkembangan *</label>
        <textarea class="form-textarea" id="r-desc" placeholder="Ceritakan perkembangan si kecil di sesi ini..." required style="min-height:100px"></textarea>
      </div>
      <!-- Media upload -->
      <div class="form-group" id="media-group">
        <label class="form-label">Lampiran Foto/Video (opsional)</label>
        <div style="border:2px dashed var(--sage-200);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s" id="drop-zone" onclick="document.getElementById('r-media').click()">
          <div style="font-size:28px;margin-bottom:6px">📎</div>
          <p style="font-size:13px;color:var(--sage-500)">Klik untuk upload foto/video hasil belajar</p>
          <p style="font-size:11px;color:var(--sage-400);margin-top:4px">JPG, PNG, MP4 · Maks 10MB</p>
          <input type="file" id="r-media" multiple accept="image/*,video/*" style="display:none" onchange="previewMedia(this)"/>
        </div>
        <div id="media-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
        <div id="existing-media" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger btn-sm hidden" id="delete-report-btn" onclick="deleteReport()">🗑 Hapus</button>
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-report')">Batal</button>
      <button class="btn btn-primary btn-sm" id="save-report-btn" onclick="saveReport()">Simpan Laporan</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { db, auth, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onAuthStateChanged, serverTimestamp }
  from '../assets/js/firebase-config.js';
import { initAdminShell } from '../assets/js/admin-shell.js';
import { toast, openModal, closeModal, formatDate, scoreClass, SUBJECT_ICONS, READING_LEVELS, WRITING_LEVELS, COUNTING_LEVELS, LEVEL_MAP, uploadToCloudinary, openLightbox }
  from '../assets/js/utils.js';

// Import Cloudinary config
import { CLOUDINARY_CONFIG } from '../assets/js/firebase-config.js';

await initAdminShell('progress');
window.openModal  = openModal;
window.closeModal = closeModal;

let allReports = [];
let allStudents = [];
let activeSubj = '';
let mediaToUpload = [];
let existingMediaUrls = [];

// ── Load data ────────────────────────────────────────────────────────────
async function loadData() {
  const [repSnap, stuSnap] = await Promise.all([
    getDocs(query(collection(db,'progress_reports'), orderBy('session_date','desc'))),
    getDocs(collection(db,'students')),
  ]);
  allReports  = repSnap.docs.map(d => ({ id:d.id, ...d.data() }));
  allStudents = stuSnap.docs.map(d => ({ id:d.id, ...d.data() })).filter(s => s.is_active !== false);
  document.getElementById('report-count').textContent = `${allReports.length} sesi tercatat`;

  // Populate student select
  const sel = document.getElementById('r-student');
  sel.innerHTML = '<option value="">Pilih murid...</option>' +
    allStudents.map(s => `<option value="${s.id}" data-name="${s.name}">${s.name} — ${s.grade}</option>`).join('');

  renderReports(allReports);
}

function renderReports(reports) {
  const filtered = activeSubj ? reports.filter(r => r.subject === activeSubj) : reports;
  const wrap = document.getElementById('reports-wrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Belum ada laporan</p></div>';
    return;
  }
  wrap.innerHTML = filtered.map(r => {
    const sc   = scoreClass(r.score);
    const imgs = (r.media_urls||[]).map(u =>
      `<img src="${u}" onclick="openLightbox('${u}')" title="Klik untuk perbesar"/>`
    ).join('');
    return `<div class="report-card">
      <div class="report-score ${sc}">${r.score !== null && r.score !== undefined ? r.score : (SUBJECT_ICONS[r.subject]||'📚')}</div>
      <div class="report-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div class="report-title">${r.title}</div>
          <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
            <span class="badge badge-sage">${SUBJECT_ICONS[r.subject]||'📚'} ${r.subject}</span>
            <button onclick="editReport('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--sage-400);padding:2px 6px" title="Edit">✏️</button>
          </div>
        </div>
        <div class="report-meta">${r.student_name||'?'} · ${formatDate(r.session_date)}</div>
        <div class="report-desc">${r.description}</div>
        ${imgs ? `<div class="report-images">${imgs}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Filter ───────────────────────────────────────────────────────────────
document.getElementById('subj-filter').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeSubj = tab.dataset.subj;
  renderReports(allReports);
});

// ── Levels dropdown ──────────────────────────────────────────────────────
window.updateLevels = function() {
  const subj   = document.getElementById('r-subject').value;
  const levels = LEVEL_MAP[subj] || [];
  const sel    = document.getElementById('r-level');
  sel.innerHTML = '<option value="">Pilih level...</option>' + levels.map(l => `<option>${l}</option>`).join('');
  document.getElementById('level-group').style.display = levels.length ? 'block' : 'none';
};

// ── Media preview ────────────────────────────────────────────────────────
window.previewMedia = function(input) {
  mediaToUpload = Array.from(input.files);
  document.getElementById('media-preview').innerHTML = mediaToUpload.map((f,i) =>
    `<div style="position:relative">
      <div style="width:60px;height:48px;background:var(--sage-100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px">${f.type.startsWith('video') ? '🎥' : '🖼️'}</div>
      <span style="position:absolute;top:-6px;right:-6px;background:#dc2626;color:white;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="removeMedia(${i})">✕</span>
    </div>`
  ).join('');
};
window.removeMedia = function(i) {
  mediaToUpload.splice(i, 1);
  const dt = new DataTransfer();
  mediaToUpload.forEach(f => dt.items.add(f));
  document.getElementById('r-media').files = dt.files;
  window.previewMedia(document.getElementById('r-media'));
};

// ── Open add modal ────────────────────────────────────────────────────────
window.openAddModal = function() {
  document.getElementById('r-edit-id').value = '';
  document.getElementById('modal-report-title').textContent = 'Tambah Laporan Belajar';
  document.getElementById('delete-report-btn').classList.add('hidden');
  ['r-student','r-subject','r-title','r-score','r-level','r-desc'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('r-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('media-preview').innerHTML = '';
  document.getElementById('existing-media').innerHTML = '';
  document.getElementById('media-group').style.display = 'block';
  mediaToUpload = []; existingMediaUrls = [];
  updateLevels();
  openModal('modal-report');
};

// ── Edit report ──────────────────────────────────────────────────────────
window.editReport = function(id) {
  const r = allReports.find(x => x.id === id);
  if (!r) return;
  document.getElementById('r-edit-id').value  = id;
  document.getElementById('modal-report-title').textContent = 'Edit Laporan';
  document.getElementById('delete-report-btn').classList.remove('hidden');
  document.getElementById('r-student').value  = r.student_id||'';
  document.getElementById('r-subject').value  = r.subject||'';
  document.getElementById('r-date').value     = r.session_date||'';
  document.getElementById('r-title').value    = r.title||'';
  document.getElementById('r-score').value    = r.score !== null && r.score !== undefined ? r.score : '';
  document.getElementById('r-desc').value     = r.description||'';
  updateLevels();
  document.getElementById('r-level').value = r.level_reached||'';
  mediaToUpload = [];
  existingMediaUrls = r.media_urls||[];
  document.getElementById('existing-media').innerHTML = existingMediaUrls.map((u,i) =>
    `<div style="position:relative">
      <img src="${u}" style="width:60px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--sage-200);cursor:pointer" onclick="openLightbox('${u}')"/>
      <span style="position:absolute;top:-6px;right:-6px;background:#dc2626;color:white;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="removeExisting(${i})">✕</span>
    </div>`
  ).join('');
  document.getElementById('media-preview').innerHTML = '';
  openModal('modal-report');
};
window.removeExisting = function(i) {
  existingMediaUrls.splice(i, 1);
  window.editReport(document.getElementById('r-edit-id').value);
};

// ── Save report ──────────────────────────────────────────────────────────
window.saveReport = async function() {
  const studentSel = document.getElementById('r-student');
  const studentId  = studentSel.value;
  const studentName = studentSel.options[studentSel.selectedIndex]?.dataset.name || '';
  const subject    = document.getElementById('r-subject').value;
  const date       = document.getElementById('r-date').value;
  const title      = document.getElementById('r-title').value.trim();
  const desc       = document.getElementById('r-desc').value.trim();
  const scoreVal   = document.getElementById('r-score').value;
  const level      = document.getElementById('r-level').value;

  if (!studentId || !subject || !date || !title || !desc) {
    toast('Lengkapi semua field wajib', 'error'); return;
  }

  const btn = document.getElementById('save-report-btn');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

  try {
    // Upload new media
    let newUrls = [];
    if (mediaToUpload.length) {
      btn.textContent = '⏳ Upload media...';
      for (const file of mediaToUpload) {
        const url = await uploadToCloudinary(file, CLOUDINARY_CONFIG);
        newUrls.push(url);
      }
    }
    const allMedia = [...existingMediaUrls, ...newUrls];

    const data = {
      student_id: studentId, student_name: studentName,
      subject, session_date: date, title, description: desc,
      score: scoreVal !== '' ? parseInt(scoreVal) : null,
      level_reached: level,
      media_urls: allMedia,
      updated_at: serverTimestamp(),
    };

    const editId = document.getElementById('r-edit-id').value;
    if (editId) {
      await updateDoc(doc(db,'progress_reports',editId), data);
      toast('Laporan berhasil diperbarui!', 'success');
    } else {
      data.created_at = serverTimestamp();
      await addDoc(collection(db,'progress_reports'), data);
      toast('Laporan berhasil disimpan!', 'success');
    }
    closeModal('modal-report');
    await loadData();
  } catch(e) { toast('Gagal: ' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = 'Simpan Laporan';
};

// ── Delete report ────────────────────────────────────────────────────────
window.deleteReport = async function() {
  const id = document.getElementById('r-edit-id').value;
  if (!id || !confirm('Hapus laporan ini?')) return;
  try {
    await deleteDoc(doc(db,'progress_reports',id));
    toast('Laporan dihapus', 'info');
    closeModal('modal-report');
    await loadData();
  } catch(e) { toast('Gagal menghapus', 'error'); }
};

window.openLightbox = openLightbox;

// Open add if ?action=new
if (new URLSearchParams(location.search).get('action') === 'new') setTimeout(openAddModal, 300);

loadData();
</script>
</body>
</html>
